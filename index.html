<script>
    // ==================== CONFIGURACIÓN Y CONSTANTES ====================
    const GEMINI_URL = (key) => `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

    const SYSTEM_PROMPT = `Eres un sistema experto en seguridad química industrial...`; 
    // (Mantengo tu prompt original completo aquí - cópialo tal cual)

    let currentResMode = 'foto';
    let currentEtqMode = 'foto';
    let currentImageBase64 = null;
    let historial = [];

    // ==================== UTILIDADES ====================
    function showToast(msg, type = 'ok') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast show ${type}`;
      setTimeout(() => toast.classList.remove('show'), 2800);
    }

    function saveLocal(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    function loadLocal(key) {
      try {
        return JSON.parse(localStorage.getItem(key)) || [];
      } catch { return []; }
    }

    // ==================== MANEJO DE IMÁGENES ====================
    function handleImage(fileInput, prefix) {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        currentImageBase64 = e.target.result;
        const preview = document.getElementById(prefix + '-preview');
        const area = document.getElementById(prefix + '-upload-area');
        
        preview.src = currentImageBase64;
        area.classList.add('has-image');
        
        checkButtonState(prefix);
      };
      reader.readAsDataURL(file);
    }

    function triggerFileInput(prefix) {
      document.getElementById(prefix + '-gallery').click();
    }

    function checkButtonState(prefix) {
      const btn = document.getElementById(prefix === 'res' ? 'btn-clasificar' : 'btn-verificar');
      const hasImage = !!currentImageBase64;
      const hasText = document.getElementById(prefix + '-desc').value.trim().length > 0;
      btn.disabled = !(hasImage || hasText);
    }

    // ==================== CAMBIO DE PESTAÑAS ====================
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.getElementById(`tab-${tab}`).classList.remove('hidden');

      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('on'));
      document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('on');
    }

    function setResMode(mode) {
      currentResMode = mode;
      document.getElementById('res-foto-panel').classList.toggle('hidden', mode !== 'foto');
      document.getElementById('res-texto-panel').classList.toggle('hidden', mode !== 'texto');
      
      document.querySelectorAll('#tab-residuos .mode-btn').forEach(b => 
        b.classList.toggle('on', b.getAttribute('onclick').includes(mode))
      );
    }

    function setEtqMode(mode) {
      currentEtqMode = mode;
      // Similar al de residuos...
    }

    // ==================== LLAMADA A GEMINI ====================
    async function analizarConGemini(isResiduo = true) {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        showToast('Ingresa tu clave API de Gemini', 'err');
        return;
      }

      const prefix = isResiduo ? 'res' : 'etq';
      const lote = document.getElementById(prefix + '-lote').value;
      const desc = document.getElementById(prefix + '-desc').value;

      const resultsDiv = document.getElementById(prefix + '-results');
      resultsDiv.innerHTML = `<div class="loading">Analizando con IA...</div>`;

      try {
        const payload = {
          contents: [{
            parts: [
              { text: SYSTEM_PROMPT + (isResiduo ? "\n\nClasifica este residuo:" : "\n\nVerifica esta etiqueta CLP:") },
              lote || desc ? { text: `Lote: ${lote}\nDescripción: ${desc}` } : {},
              currentImageBase64 ? {
                inlineData: { mimeType: "image/jpeg", data: currentImageBase64.split(',')[1] }
              } : {}
            ].filter(Boolean)
          }]
        };

        const resp = await fetch(GEMINI_URL(apiKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await resp.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        
        let jsonText = text.replace(/```json|```/g, '').trim();
        const result = JSON.parse(jsonText);

        renderResult(result, isResiduo, resultsDiv);

        // Guardar en historial
        historial.unshift({
          fecha: new Date().toLocaleString('es-ES'),
          tipo: isResiduo ? 'Residuo' : 'Etiqueta',
          data: result
        });
        saveLocal('quimico_historial', historial);

      } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = `<p style="color:var(--danger)">Error: ${err.message}</p>`;
        showToast('Error al procesar la solicitud', 'err');
      }
    }

    function renderResult(result, isResiduo, container) {
      // Renderizado bonito del JSON (puedes expandirlo)
      container.innerHTML = `
        <div class="result-card">
          <h3>${result.producto?.nombre_comercial || 'Resultado'}</h3>
          <pre style="background:#f8f9fa;padding:12px;border-radius:8px;font-size:13px;">${JSON.stringify(result, null, 2)}</pre>
        </div>`;
    }

    // ==================== BOTONES PRINCIPALES ====================
    function clasificarResiduo() {
      analizarConGemini(true);
    }

    function verificarEtiqueta() {
      analizarConGemini(false);
    }

    function saveApiKey() {
      const key = document.getElementById('apiKey').value.trim();
      if (key) {
        localStorage.setItem('gemini_api_key', key);
        document.getElementById('keyStatus').innerHTML = '✅ Clave guardada correctamente';
        showToast('Clave API guardada');
      }
    }

    function clearHistorial() {
      if (confirm('¿Eliminar todo el historial?')) {
        historial = [];
        saveLocal('quimico_historial', []);
        renderHistorial();
      }
    }

    function renderHistorial() {
      const list = document.getElementById('historial-list');
      list.innerHTML = historial.map((item, i) => `
        <div class="card">
          <small>${item.fecha} - ${item.tipo}</small>
          <p><strong>${item.data.producto?.nombre_comercial || ''}</strong></p>
        </div>
      `).join('');
    }

    // ==================== INICIALIZACIÓN ====================
    function init() {
      // Cargar clave API
      const savedKey = localStorage.getItem('gemini_api_key');
      if (savedKey) {
        document.getElementById('apiKey').value = savedKey;
        document.getElementById('keyStatus').innerHTML = '✅ Clave guardada';
      }

      historial = loadLocal('quimico_historial');
      renderHistorial();

      // Eventos de archivos
      ['res', 'etq'].forEach(prefix => {
        const camera = document.getElementById(prefix + '-camera');
        const gallery = document.getElementById(prefix + '-gallery');
        
        if (camera) camera.addEventListener('change', () => handleImage(camera, prefix));
        if (gallery) gallery.addEventListener('change', () => handleImage(gallery, prefix));
      });

      // Modo por defecto
      switchTab('residuos');
      setResMode('foto');
    }

    window.onload = init;
  </script>
</body>
</html>
